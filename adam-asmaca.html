<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam Asmaca 🪢</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background: linear-gradient(135deg,#1a1a3e,#0f2027); font-family:'Nunito',sans-serif; min-height:100vh; color:#fff; }

.header { text-align:center; padding:24px 20px 12px; }
.header h1 { font-family:'Fredoka One',cursive; font-size:2.4rem; color:#ffd700; text-shadow:0 3px 12px rgba(255,215,0,.4); }
.header p { color:rgba(255,255,255,.6); font-weight:700; font-size:14px; margin-top:4px; }

.game { max-width:800px; margin:0 auto; padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:20px; }

/* Darağacı */
.gallows-area { display:flex; flex-direction:column; align-items:center; gap:12px; }
.gallows-svg { filter:drop-shadow(0 4px 16px rgba(0,0,0,.5)); }
.wrong-count { font-family:'Fredoka One',cursive; font-size:18px; color:#ef5350; }
.lives { display:flex; gap:6px; }
.heart { font-size:22px; transition:all .3s; }
.heart.lost { filter:grayscale(1); opacity:.3; }

/* Kategori */
.category-badge { background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.2); border-radius:20px; padding:6px 18px; font-size:13px; font-weight:800; color:#ffd700; }

/* Kelime alanı */
.word-area { display:flex; flex-direction:column; align-items:center; gap:16px; justify-content:center; }
.letter-boxes { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.letter-box {
  width:44px; height:52px; border-bottom:3px solid rgba(255,255,255,.7);
  display:flex; align-items:center; justify-content:center;
  font-family:'Fredoka One',cursive; font-size:26px; color:#ffd700;
  transition:all .3s;
}
.letter-box.space { border-bottom:none; width:20px; }
.hint-text { font-size:13px; font-weight:700; color:rgba(255,255,255,.55); text-align:center; padding:0 10px; }

/* Klavye */
.keyboard { grid-column:1/-1; }
.keyboard-row { display:flex; gap:6px; justify-content:center; margin-bottom:6px; flex-wrap:wrap; }
.key {
  width:46px; height:46px; border-radius:10px;
  background:rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.2);
  color:#fff; font-family:'Fredoka One',cursive; font-size:18px;
  cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center;
}
.key:hover:not(:disabled) { background:rgba(255,255,255,.25); transform:translateY(-2px); }
.key:disabled { opacity:.2; cursor:not-allowed; transform:none; }
.key.correct { background:#2e7d32; border-color:#4caf50; }
.key.wrong { background:#c62828; border-color:#ef5350; }

/* Sonuç */
.result-overlay {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.8); align-items:center; justify-content:center;
}
.result-overlay.show { display:flex; }
.result-box { background:#1a1a3e; border:3px solid #ffd700; border-radius:24px; padding:36px 40px; text-align:center; max-width:360px; }
.result-emoji { font-size:60px; margin-bottom:12px; }
.result-title { font-family:'Fredoka One',cursive; font-size:28px; margin-bottom:8px; }
.result-word { font-family:'Fredoka One',cursive; font-size:22px; color:#ffd700; margin-bottom:18px; }
.result-btn { background:#ffd700; color:#1a1a3e; border:none; border-radius:20px; padding:12px 32px; font-family:'Fredoka One',cursive; font-size:18px; cursor:pointer; }
.result-btn:hover { background:#ffecb3; }

/* Yeni oyun & kategori */
.controls { grid-column:1/-1; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.ctrl-btn { background:rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.25); color:#fff; border-radius:20px; padding:9px 20px; font-family:'Nunito',sans-serif; font-size:14px; font-weight:800; cursor:pointer; transition:all .2s; }
.ctrl-btn:hover { background:rgba(255,255,255,.22); }
.ctrl-btn.active { background:#ffd700; color:#1a1a3e; border-color:#ffd700; }

.score-bar { grid-column:1/-1; display:flex; justify-content:center; gap:24px; }
.score-item { text-align:center; }
.score-num { font-family:'Fredoka One',cursive; font-size:28px; color:#ffd700; }
.score-lbl { font-size:12px; color:rgba(255,255,255,.55); font-weight:700; }

@media (max-width:580px) {
  .game { grid-template-columns:1fr; }
  .gallows-area { order:1; }
  .word-area { order:2; }
  .keyboard { order:3; }
  .controls { order:0; }
  .key { width:38px; height:38px; font-size:15px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🪢 Adam Asmaca</h1>
  <p>Harfleri tahmin et, adamı kurtar!</p>
</div>

<div class="game">
  <!-- KONTROLLER -->
  <div class="controls">
    <button class="ctrl-btn active" id="catAll" onclick="setCategory('hepsi')">🌟 Hepsi</button>
    <button class="ctrl-btn" id="catTurkce" onclick="setCategory('turkce')">📖 Türkçe</button>
    <button class="ctrl-btn" id="catHayat" onclick="setCategory('hayat')">🌍 Hayat Bilgisi</button>
    <button class="ctrl-btn" id="catMat" onclick="setCategory('matematik')">🔢 Matematik</button>
    <button class="ctrl-btn" onclick="newGame()" style="background:#ffd700;color:#1a1a3e;border-color:#ffd700;">🔄 Yeni Kelime</button>
  </div>

  <!-- PUAN -->
  <div class="score-bar">
    <div class="score-item"><div class="score-num" id="winNum">0</div><div class="score-lbl">Kazandın</div></div>
    <div class="score-item"><div class="score-num" id="loseNum">0</div><div class="score-lbl">Kaybettin</div></div>
    <div class="score-item"><div class="score-num" id="streakNum">0</div><div class="score-lbl">Seri 🔥</div></div>
  </div>

  <!-- DARAĞACI -->
  <div class="gallows-area">
    <div class="category-badge" id="catBadge">🌟 Hepsi</div>
    <svg class="gallows-svg" width="200" height="220" viewBox="0 0 200 220">
      <!-- Çerçeve -->
      <line x1="20" y1="210" x2="180" y2="210" stroke="rgba(255,255,255,.4)" stroke-width="4" stroke-linecap="round"/>
      <line x1="60" y1="210" x2="60" y2="20" stroke="rgba(255,255,255,.4)" stroke-width="4" stroke-linecap="round"/>
      <line x1="60" y1="20" x2="130" y2="20" stroke="rgba(255,255,255,.4)" stroke-width="4" stroke-linecap="round"/>
      <line x1="130" y1="20" x2="130" y2="45" stroke="rgba(255,255,255,.4)" stroke-width="4" stroke-linecap="round"/>
      <!-- Adam parçaları -->
      <circle id="head" cx="130" cy="60" r="16" stroke="#ef5350" stroke-width="3" fill="none" opacity="0"/>
      <line id="body" x1="130" y1="76" x2="130" y2="130" stroke="#ef5350" stroke-width="3" stroke-linecap="round" opacity="0"/>
      <line id="larm" x1="130" y1="90" x2="108" y2="115" stroke="#ef5350" stroke-width="3" stroke-linecap="round" opacity="0"/>
      <line id="rarm" x1="130" y1="90" x2="152" y2="115" stroke="#ef5350" stroke-width="3" stroke-linecap="round" opacity="0"/>
      <line id="lleg" x1="130" y1="130" x2="110" y2="165" stroke="#ef5350" stroke-width="3" stroke-linecap="round" opacity="0"/>
      <line id="rleg" x1="130" y1="130" x2="150" y2="165" stroke="#ef5350" stroke-width="3" stroke-linecap="round" opacity="0"/>
    </svg>
    <div class="lives" id="livesDisplay"></div>
    <div class="wrong-count" id="wrongCount">0 / 6 yanlış</div>
  </div>

  <!-- KELIME -->
  <div class="word-area">
    <div class="letter-boxes" id="letterBoxes"></div>
    <div class="hint-text" id="hintText"></div>
  </div>

  <!-- KLAVİYE -->
  <div class="keyboard">
    <div class="keyboard-row" id="row1"></div>
    <div class="keyboard-row" id="row2"></div>
    <div class="keyboard-row" id="row3"></div>
  </div>
</div>

<!-- SONUÇ -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-word" id="resultWord"></div>
    <button class="result-btn" onclick="newGame()">▶️ Devam Et</button>
  </div>
</div>

<script>
var words = {
  turkce: [
    {w:'OKUL',hint:'Ders okuduğumuz yer 🏫'},{w:'KİTAP',hint:'Okuduğumuz şey 📖'},
    {w:'KALEM',hint:'Yazı yazdığımız araç ✏️'},{w:'DEFTER',hint:'Yazdığımız şey 📓'},
    {w:'CÜMLE',hint:'Kelimelerden oluşur 📝'},{w:'HECE',hint:'Kelimenin parçası'},
    {w:'NOKTA',hint:'Cümle sonuna konur .'},{w:'SÖZCÜK',hint:'Kelime demektir'},
    {w:'ATASÖZÜ',hint:'Atalardan gelen bilgelik'},{w:'DEYİM',hint:'Mecazlı anlatım'},
    {w:'SESLI',hint:'A E I O U harfleri'},{w:'SESSIZ',hint:'Ses çıkarmayan harf'},
    {w:'YAZAR',hint:'Kitap yazan kişi'},{w:'ŞIIR',hint:'Mısralardan oluşur ✨'},
    {w:'HİKAYE',hint:'Anlatılan kısa öykü'},{w:'MASAL',hint:'Bir varmış bir yokmuş...'},
  ],
  hayat: [
    {w:'AİLE',hint:'Anne baba ve çocuklar 👨‍👩‍👧'},{w:'VATAN',hint:'Yaşadığımız ülke 🇹🇷'},
    {w:'BAYRAK',hint:'Ülkenin sembolü'},{w:'ATATÜRK',hint:'Cumhuriyetimizin kurucusu'},
    {w:'DOĞA',hint:'Orman, dağ, deniz...'},{w:'HAYVAN',hint:'Canlı varlık 🐾'},
    {w:'BİTKİ',hint:'Toprakta yetişir 🌱'},{w:'MEVSIM',hint:'Kış yaz ilkbahar sonbahar'},
    {w:'HAVA',hint:'Güneşli yağmurlu karlı...'},{w:'DEPREM',hint:'Yer sallanması'},
    {w:'TASARRUF',hint:'İsraf etmemek 💡'},{w:'SAĞLIK',hint:'Hasta olmamak 💊'},
    {w:'TEMİZLİK',hint:'Mikroplardan korunur'},{w:'KOMŞU',hint:'Yanımızda oturan'},
    {w:'ÇEVRE',hint:'Etrafımızdaki doğa 🌍'},
  ],
  matematik: [
    {w:'SAYI',hint:'Rakamlardan oluşur 🔢'},{w:'TOPLAMA',hint:'Artı işlemi +'},{w:'CIKARMA',hint:'Eksi işlemi -'},
    {w:'ONLUK',hint:'10 birlikten oluşur'},{w:'BİRLİK',hint:'En küçük basamak'},
    {w:'DESTE',hint:'10 tane demektir'},{w:'DÜZİNE',hint:'12 tane demektir'},
    {w:'YUVARLAMA',hint:'En yakın ona yuvarlama'},{w:'BASAMAK',hint:'Birler onlar yüzler'},
    {w:'BÜYÜK',hint:'Karşılaştırmada daha fazla'},{w:'KÜÇÜK',hint:'Karşılaştırmada daha az'},
    {w:'EŞİT',hint:'İkisi aynı = işareti'},{w:'RİTMİK',hint:'Düzenli sayma'},
    {w:'CARPIM',hint:'Çarpma işlemi ×'},{w:'GEOMETRİ',hint:'Şekiller ve cisimler'},
  ]
};

var alphabet = ['A','B','C','Ç','D','E','F','G','Ğ','H','I','İ','J','K','L','M','N','O','Ö','P','R','S','Ş','T','U','Ü','V','Y','Z'];
var rows = [
  ['A','B','C','Ç','D','E','F','G','Ğ','H','I','İ','J'],
  ['K','L','M','N','O','Ö','P','R','S','Ş','T'],
  ['U','Ü','V','Y','Z']
];

var bodyParts = ['head','body','larm','rarm','lleg','rleg'];
var currentWord = '', currentHint = '', guessed = [], wrong = 0, maxWrong = 6;
var wins = 0, losses = 0, streak = 0;
var currentCategory = 'hepsi';
var usedWords = [];

function setCategory(cat) {
  currentCategory = cat;
  usedWords = [];
  document.querySelectorAll('.ctrl-btn').forEach(function(b){ b.classList.remove('active'); });
  var labels = {hepsi:'catAll',turkce:'catTurkce',hayat:'catHayat',matematik:'catMat'};
  document.getElementById(labels[cat]).classList.add('active');
  var badges = {hepsi:'🌟 Hepsi',turkce:'📖 Türkçe',hayat:'🌍 Hayat Bilgisi',matematik:'🔢 Matematik'};
  document.getElementById('catBadge').textContent = badges[cat];
  newGame();
}

function getWordList() {
  if(currentCategory === 'hepsi') {
    return words.turkce.concat(words.hayat).concat(words.matematik);
  }
  return words[currentCategory] || words.turkce;
}

function newGame() {
  document.getElementById('resultOverlay').classList.remove('show');
  wrong = 0; guessed = [];
  bodyParts.forEach(function(p){ document.getElementById(p).style.opacity=0; });

  var list = getWordList().filter(function(w){ return !usedWords.includes(w.w); });
  if(list.length === 0){ usedWords=[]; list=getWordList(); }
  var pick = list[Math.floor(Math.random()*list.length)];
  usedWords.push(pick.w);
  currentWord = pick.w;
  currentHint = pick.hint;

  buildBoxes();
  buildKeyboard();
  updateLives();
  document.getElementById('wrongCount').textContent = '0 / 6 yanlış';
  document.getElementById('hintText').textContent = '💡 ' + currentHint;
}

function buildBoxes() {
  var cont = document.getElementById('letterBoxes');
  cont.innerHTML = '';
  currentWord.split('').forEach(function(ch) {
    var d = document.createElement('div');
    d.className = 'letter-box' + (ch===' '?' space':'');
    d.id = 'box_'+cont.children.length;
    d.dataset.letter = ch;
    cont.appendChild(d);
  });
}

function buildKeyboard() {
  rows.forEach(function(row, i) {
    var rowEl = document.getElementById('row'+(i+1));
    rowEl.innerHTML = '';
    row.forEach(function(ch) {
      var btn = document.createElement('button');
      btn.className = 'key';
      btn.id = 'key_'+ch;
      btn.textContent = ch;
      btn.onclick = function(){ guess(ch); };
      rowEl.appendChild(btn);
    });
  });
}

function guess(ch) {
  if(guessed.includes(ch)) return;
  guessed.push(ch);
  var btn = document.getElementById('key_'+ch);
  btn.disabled = true;

  if(currentWord.includes(ch)) {
    btn.classList.add('correct');
    // Harfleri göster
    Array.from(document.getElementById('letterBoxes').children).forEach(function(box) {
      if(box.dataset.letter === ch) box.textContent = ch;
    });
    // Kazandı mı?
    var allFound = currentWord.split('').every(function(l){ return guessed.includes(l); });
    if(allFound) {
      wins++; streak++;
      document.getElementById('winNum').textContent = wins;
      document.getElementById('streakNum').textContent = streak;
      setTimeout(function(){
        document.getElementById('resultEmoji').textContent='🎉';
        document.getElementById('resultTitle').textContent='Tebrikler! Kurtardın!';
        document.getElementById('resultWord').textContent='Kelime: '+currentWord;
        document.getElementById('resultOverlay').classList.add('show');
      }, 400);
    }
  } else {
    btn.classList.add('wrong');
    document.getElementById('head').style.opacity = wrong>=0?1:0;
    document.getElementById(bodyParts[wrong]).style.opacity = 1;
    wrong++;
    updateLives();
    document.getElementById('wrongCount').textContent = wrong + ' / 6 yanlış';
    if(wrong >= maxWrong) {
      losses++; streak=0;
      document.getElementById('loseNum').textContent = losses;
      document.getElementById('streakNum').textContent = streak;
      // Cevabı göster
      Array.from(document.getElementById('letterBoxes').children).forEach(function(box) {
        if(!box.textContent) { box.textContent = box.dataset.letter; box.style.color='#ef5350'; }
      });
      setTimeout(function(){
        document.getElementById('resultEmoji').textContent='😢';
        document.getElementById('resultTitle').textContent='Asıldı! Olmadı...';
        document.getElementById('resultWord').textContent='Cevap: '+currentWord;
        document.getElementById('resultOverlay').classList.add('show');
      }, 600);
    }
  }
}

function updateLives() {
  var d = document.getElementById('livesDisplay');
  d.innerHTML = '';
  for(var i=0;i<6;i++){
    var h=document.createElement('span');
    h.className='heart'+(i<wrong?' lost':'');
    h.textContent='❤️';
    d.appendChild(h);
  }
}

newGame();
</script>
</body>
</html>
