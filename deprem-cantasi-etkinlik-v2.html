<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Deprem Çantası – Etkinlik Sayfası v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { font-family: 'Nunito', sans-serif; background: #fff; }

  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    padding: 10mm 13mm;
    background: #fff;
    position: relative;
  }

  /* === HEADER === */
  .header {
    background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
    border-radius: 16px;
    padding: 10px 16px;
    margin-bottom: 9px;
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header .big-icon { font-size: 42px; }
  .header-txt h1 { font-family: 'Baloo 2'; font-size: 20px; font-weight: 800; }
  .header-txt p { font-size: 11px; opacity: 0.85; font-weight: 600; }

  .footer {
    border-top: 2px dashed #bbdefb;
    padding-top: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9px;
    color: #aaa;
    font-weight: 700;
    margin-top: auto;
  }
  .footer .school { color: #1565c0; font-size: 10px; }

  @media print {
    body { margin: 0; }
    .page { margin: 0; padding: 10mm 13mm; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="big-icon">🏠</div>
    <div class="header-txt">
      <h1>DEPREM ÇANTASI ETKİNLİK SAYFASI</h1>
      <p>Afet hazırlığı • 2. Sınıf Hayat Bilgisi • Tatlıca İlkokulu</p>
    </div>
  </div>
  <div class="footer">
    <div class="school">🏫 Tatlıca İlkokulu – Şanlıurfa</div>
    <div>Öğretmen: Hasan Tutuş</div>
  </div>
</div>
</body>
</html>
