<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kız Giydirme Oyunu 👗</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #e91e8c;
  --pink-l: #fce4ec;
  --purple: #7b1fa2;
  --blue: #1565c0;
  --green: #2e7d32;
  --orange: #e65100;
  --bg: #fff0f8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Nunito', sans-serif; min-height: 100vh; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #e91e8c, #9c27b0);
  padding: 18px 24px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.header h1 { font-family: 'Fredoka One', cursive; font-size: 24px; color: #fff; }
.score-box {
  background: rgba(255,255,255,.2); border: 2px solid rgba(255,255,255,.4);
  border-radius: 30px; padding: 8px 20px; color: #fff;
  font-family: 'Fredoka One', cursive; font-size: 20px;
  display: flex; align-items: center; gap: 8px;
}

/* GÖREV BANNER */
.mission-bar {
  background: linear-gradient(135deg, #fff3e0, #fce4ec);
  border-bottom: 3px solid #f8bbd0;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.mission-text {
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  color: var(--pink);
  display: flex; align-items: center; gap: 10px;
}
.mission-season {
  background: var(--pink);
  color: #fff; border-radius: 20px; padding: 6px 18px;
  font-size: 14px; font-weight: 800;
}
.mission-btns { display: flex; gap: 8px; }
.mis-btn {
  background: #fff; border: 2px solid var(--pink); color: var(--pink);
  border-radius: 20px; padding: 7px 16px; font-family: 'Nunito',sans-serif;
  font-size: 13px; font-weight: 800; cursor: pointer; transition: all .2s;
}
.mis-btn:hover { background: var(--pink); color: #fff; }

/* MAIN LAYOUT */
.game-area {
  display: grid;
  grid-template-columns: 280px 1fr 280px;
  gap: 0;
  max-height: calc(100vh - 140px);
  overflow: hidden;
}

/* KIYAFETLERsol */
.wardrobe {
  background: linear-gradient(180deg, #fce4ec, #f8bbd0);
  border-right: 3px solid #f48fb1;
  padding: 16px 12px;
  overflow-y: auto;
}
.wardrobe-title {
  font-family: 'Fredoka One', cursive;
  font-size: 16px; color: var(--pink);
  text-align: center; margin-bottom: 12px;
  background: #fff; border-radius: 12px; padding: 6px;
}
.category-title {
  font-size: 11px; font-weight: 800; color: #ad1457;
  text-transform: uppercase; letter-spacing: 1.5px;
  margin: 10px 0 6px; display: flex; align-items: center; gap: 6px;
}
.category-title::after { content:''; flex:1; height:1px; background:#f48fb1; }
.clothes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.clothing-item {
  background: #fff;
  border: 2.5px solid #f8bbd0;
  border-radius: 14px;
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  user-select: none;
}
.clothing-item:hover { transform: translateY(-4px); box-shadow: 0 6px 16px rgba(233,30,140,.2); border-color: var(--pink); }
.clothing-item.worn { opacity: .45; cursor: not-allowed; border-color: #aaa; }
.clothing-item.wrong-season { border-color: #ef9a9a !important; }
.clothing-item.correct-season { border-color: #a5d6a7 !important; }
.item-emoji { font-size: 36px; display: block; margin-bottom: 4px; }
.item-name { font-size: 11px; font-weight: 800; color: #555; }
.item-season { font-size: 9px; color: #888; margin-top: 2px; }

/* KIZ KARAKTERi - orta */
.character-area {
  background: linear-gradient(180deg, #e8f5e9 0%, #f3e5f5 50%, #e3f2fd 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  min-height: 500px;
}

.scene-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
}

.char-wrap {
  position: relative;
  width: 200px;
  height: 380px;
  z-index: 5;
}

/* SVG karakter */
.char-svg { width: 200px; height: 380px; }

/* Giyilen kıyafet katmanları */
.layer {
  position: absolute;
  top: 0; left: 0;
  width: 200px; height: 380px;
  pointer-events: none;
  transition: opacity .3s;
}

/* Çıkar butonu */
.remove-btn {
  background: var(--pink); color: #fff; border: none; border-radius: 20px;
  padding: 8px 20px; font-family: 'Nunito',sans-serif; font-size: 13px; font-weight: 800;
  cursor: pointer; margin-top: 14px; z-index: 10;
}
.remove-btn:hover { background: #ad1457; }

/* SAĞ - Giyilenler & Bilgi */
.info-panel {
  background: linear-gradient(180deg, #f3e5f5, #e8eaf6);
  border-left: 3px solid #ce93d8;
  padding: 16px 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.worn-title {
  font-family: 'Fredoka One', cursive;
  font-size: 16px; color: var(--purple);
  background: #fff; border-radius: 12px; padding: 6px;
  text-align: center;
}
.worn-list { display: flex; flex-direction: column; gap: 6px; }
.worn-item {
  background: #fff; border-radius: 10px; padding: 8px 12px;
  display: flex; align-items: center; gap: 8px;
  border: 1.5px solid #ce93d8; font-size: 13px; font-weight: 700;
}
.worn-item .wi-emoji { font-size: 20px; }
.wi-remove {
  margin-left: auto; background: #ef9a9a; border: none; border-radius: 50%;
  width: 22px; height: 22px; cursor: pointer; font-size: 12px; color: #fff;
  display: flex; align-items: center; justify-content: center;
}

/* Puan animasyonu */
.point-popup {
  position: fixed;
  font-family: 'Fredoka One', cursive;
  font-size: 32px;
  pointer-events: none;
  z-index: 999;
  animation: floatUp 1.2s ease forwards;
}
@keyframes floatUp {
  0% { opacity:1; transform: translateY(0) scale(1); }
  100% { opacity:0; transform: translateY(-80px) scale(1.4); }
}

/* Feedback toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; border-radius: 25px; padding: 12px 28px;
  font-size: 15px; font-weight: 800; z-index: 998;
  transition: all .3s; opacity: 0; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.ok { background: #2e7d32; }
.toast.wrong { background: #c62828; }
.toast.info { background: #1565c0; }

/* Konfeti */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 2px;
  animation: fall 2s ease forwards;
  pointer-events: none;
  z-index: 997;
}
@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity:1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
}

/* Mevsim seçici */
.season-selector {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.season-btn {
  background: #fff; border: 2.5px solid #f48fb1; border-radius: 20px;
  padding: 8px 16px; font-family: 'Nunito',sans-serif; font-size: 13px; font-weight: 800;
  color: var(--pink); cursor: pointer; transition: all .2s;
}
.season-btn:hover { transform: scale(1.05); }
.season-btn.active { border-color: var(--pink); }
.season-btn.kış.active { background: #e3f2fd; border-color: var(--blue); color: var(--blue); }
.season-btn.yaz.active { background: #fff8e1; border-color: var(--orange); color: var(--orange); }
.season-btn.ilkbahar.active { background: #e8f5e9; border-color: var(--green); color: var(--green); }
.season-btn.sonbahar.active { background: #fff3e0; border-color: #ef6c00; color: #ef6c00; }
.season-btn.okul.active { background: #f3e5f5; border-color: var(--purple); color: var(--purple); }

@media (max-width: 700px) {
  .game-area { grid-template-columns: 1fr; grid-template-rows: auto 400px auto; }
  .wardrobe { border-right: none; border-bottom: 3px solid #f48fb1; max-height: 220px; }
  .info-panel { border-left: none; border-top: 3px solid #ce93d8; }
}
</style>

var seasonGuides = {
  kış: '❄️ Kış için:\n✅ Mont, Kazak, Uzun Kol\n✅ Pantolon\n✅ Bot, Kar Botu\n✅ Atkı, Bere\n❌ Şort, Sandalet olmaz!',
  yaz: '☀️ Yaz için:\n✅ Tişört\n✅ Etek, Şort\n✅ Sandalet\n✅ Şapka, Güneş Gözlüğü\n❌ Mont, Bere olmaz!',
  ilkbahar: '🌸 İlkbahar için:\n✅ Tişört, Gömlek\n✅ Etek, Tüllü Etek\n✅ Hırka, Yağmurluk\n✅ Spor Ayakkabı\n✅ Şemsiye',
  sonbahar: '🍂 Sonbahar için:\n✅ Uzun Kol, Kazak\n✅ Pantolon\n✅ Hırka, Yağmurluk\n✅ Bot\n✅ Atkı, Şemsiye',
  okul: '🎒 Okul için:\n✅ Gömlek, Tişört\n✅ Pantolon, Tüllü Etek\n✅ Spor Ayakkabı\n✅ Okul Çantası\n✅ Hırka',
};

var currentMission = null;
var wornItems = {}; // {category: clothingId}
var score = 0;
var highScore = 0;

// ══════════════════════════════
// KIYAFET KARTLARI OLUŞTUR
// ══════════════════════════════
function buildClothes() {
  var cats = {top:'topClothes', bottom:'bottomClothes', outer:'outerClothes', shoe:'shoeClothes', access:'accessClothes'};
  Object.keys(cats).forEach(function(cat) {
    var container = document.getElementById(cats[cat]);
    container.innerHTML = '';
    clothes[cat].forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'clothing-item';
      div.id = 'item_'+item.id;
      div.innerHTML = '<span class="item-emoji">'+item.emoji+'</span><div class="item-name">'+item.name+'</div>';
      div.onclick = function(){ wearItem(cat, item); };
      container.appendChild(div);
    });
  });
}

// ══════════════════════════════
// KIYAFETİ GİYDİR
// ══════════════════════════════
function wearItem(cat, item) {
  // Önceki aynı kategori kıyafetini çıkar
  if(wornItems[cat]) {
    removeItem(cat);
  }

  wornItems[cat] = item.id;

  // SVG katman güncelle
  var layerMap = {top:'layerTop', bottom:'layerBottom', outer:'layerOuter', shoe:'layerShoe', access:'layerAcc'};
  var layer = document.getElementById(layerMap[cat]);
  layer.innerHTML = '<svg viewBox="0 0 200 380" xmlns="http://www.w3.org/2000/svg" width="200" height="380">'+item.svg+'</svg>';

  // Kart işaretle
  document.getElementById('item_'+item.id).classList.add('worn');

  // Mevsim kontrolü - anlık geri bildirim
  if(currentMission) {
    var correct = item.seasons.includes(currentMission);
    if(correct) {
      showToast('✅ '+ item.name +' bu mevsim için uygun!', 'ok');
    } else {
      showToast('⚠️ '+ item.name +' bu mevsim için uygun olmayabilir!', 'wrong');
    }
  }

  updateWornList();
}

function removeItem(cat) {
  if(!wornItems[cat]) return;
  var oldId = wornItems[cat];
  var oldEl = document.getElementById('item_'+oldId);
  if(oldEl) oldEl.classList.remove('worn');

  var layerMap = {top:'layerTop', bottom:'layerBottom', outer:'layerOuter', shoe:'layerShoe', access:'layerAcc'};
  document.getElementById(layerMap[cat]).innerHTML = '';
  delete wornItems[cat];
  updateWornList();
}

function removeAll() {
  Object.keys(wornItems).forEach(function(cat){ removeItem(cat); });
}

function resetAll() {
  removeAll();
  currentMission = null;
  document.getElementById('missionText').textContent = 'Bir mevsim seç!';
  document.getElementById('missionText').style.color = 'var(--pink)';
  document.getElementById('seasonGuide').textContent = '';
  document.getElementById('sceneBg').style.background = '';
  document.getElementById('sceneEmoji').textContent = '🏠';
  document.querySelectorAll('.season-btn').forEach(function(b){ b.classList.remove('active'); });
}

// ══════════════════════════════
// GİYİLENLER LİSTESİ
// ══════════════════════════════
function updateWornList() {
  var list = document.getElementById('wornList');
  var keys = Object.keys(wornItems);
  if(keys.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;font-weight:700;padding:20px 0;">Henüz kıyafet seçilmedi...</div>';
    return;
  }
  list.innerHTML = '';
  var catNames = {top:'Üst', bottom:'Alt', outer:'Dış', shoe:'Ayakkabı', access:'Aksesuar'};
  keys.forEach(function(cat) {
    var itemId = wornItems[cat];
    var item = clothes[cat].find(function(c){return c.id===itemId;});
    if(!item) return;
    var div = document.createElement('div');
    div.className = 'worn-item';
    div.innerHTML = '<span class="wi-emoji">'+item.emoji+'</span><span>'+item.name+'<br><small style="color:#aaa">'+catNames[cat]+'</small></span><button class="wi-remove" onclick="removeItem(\''+cat+'\')">✕</button>';
    list.appendChild(div);
  });
}

// ══════════════════════════════
// MİSYON
// ══════════════════════════════
var sceneData = {
  kış: {bg:'linear-gradient(180deg,#bbdefb,#e3f2fd)', emoji:'❄️🌨️', color:'#1565c0'},
  yaz: {bg:'linear-gradient(180deg,#fff9c4,#e8f5e9)', emoji:'☀️🌺', color:'#e65100'},
  ilkbahar: {bg:'linear-gradient(180deg,#f3e5f5,#e8f5e9)', emoji:'🌸🦋', color:'#2e7d32'},
  sonbahar: {bg:'linear-gradient(180deg,#fff3e0,#fce4ec)', emoji:'🍂🍁', color:'#ef6c00'},
  okul: {bg:'linear-gradient(180deg,#e8eaf6,#f3e5f5)', emoji:'🎒📚', color:'#7b1fa2'},
};

function setMission(season, text, color) {
  removeAll();
  currentMission = season;
  document.getElementById('missionText').textContent = text;
  document.getElementById('missionText').style.color = color;
  document.getElementById('seasonGuide').textContent = (seasonGuides[season]||'').replace(/\\n/g,'\n');
  document.getElementById('seasonGuide').style.whiteSpace = 'pre-line';

  var sc = sceneData[season];
  document.getElementById('sceneBg').style.background = sc.bg;
  document.getElementById('sceneEmoji').textContent = sc.emoji;

  document.querySelectorAll('.season-btn').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');

  showToast('🎯 Görev: '+text, 'info');
}

// ══════════════════════════════
// KONTROL ET & PUANLA
// ══════════════════════════════
function checkOutfit() {
  if(!currentMission) { showToast('Önce bir mevsim seç!', 'info'); return; }
  var total = Object.keys(wornItems).length;
  if(total === 0) { showToast('Hiç kıyafet seçmedin!', 'wrong'); return; }

  var correct = 0, wrong = 0;
  Object.keys(wornItems).forEach(function(cat) {
    var item = clothes[cat].find(function(c){return c.id===wornItems[cat];});
    if(item && item.seasons.includes(currentMission)) correct++;
    else wrong++;
  });

  var points = correct * 10 - wrong * 5;
  if(points < 0) points = 0;
  score += points;
  if(score > highScore) highScore = score;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('highScore').textContent = highScore;

  if(wrong === 0 && correct >= 3) {
    showToast('🎉 Mükemmel! +'+points+' puan! Tüm kıyafetler uygun!', 'ok');
    showPoints('+'+points, '#2e7d32');
    confetti();
  } else if(wrong === 0) {
    showToast('✅ Harika! +'+points+' puan! Daha fazla kıyafet giydirebilirsin.', 'ok');
    showPoints('+'+points, '#1565c0');
  } else {
    showToast('⚠️ '+correct+' doğru, '+wrong+' yanlış kıyafet! +'+points+' puan', wrong>correct?'wrong':'ok');
    showPoints('+'+points, wrong>0?'#e65100':'#2e7d32');
  }
}

// ══════════════════════════════
// YARDIMCI FONKSİYONLAR
// ══════════════════════════════
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show '+type;
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.className='toast'; }, 3000);
}

function showPoints(text, color) {
  var el = document.createElement('div');
  el.className = 'point-popup';
  el.textContent = text;
  el.style.color = color;
  el.style.left = '50%'; el.style.top = '40%';
  el.style.transform = 'translateX(-50%)';
  document.body.appendChild(el);
  setTimeout(function(){ document.body.removeChild(el); }, 1200);
}

function confetti() {
  var colors = ['#ff6b9d','#ffd700','#7b1fa2','#2196f3','#4caf50','#ff5722'];
  for(var i=0;i<30;i++){
    (function(i){
      setTimeout(function(){
        var el=document.createElement('div');
        el.className='confetti-piece';
        el.style.left=Math.random()*100+'vw';
        el.style.top='-20px';
        el.style.background=colors[Math.floor(Math.random()*colors.length)];
        el.style.transform='rotate('+Math.random()*360+'deg)';
        el.style.animationDuration=(1.5+Math.random())+'s';
        document.body.appendChild(el);
        setTimeout(function(){document.body.removeChild(el);},3000);
      }, i*60);
    })(i);
  }
}

// ══════════════════════════════
// BAŞLAT
// ══════════════════════════════
buildClothes();
</script>
