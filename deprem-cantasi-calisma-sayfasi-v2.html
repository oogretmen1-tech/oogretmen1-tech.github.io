<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Deprem Çantası – Çalışma Sayfası v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #fff;
  }

  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    padding: 10mm 12mm;
    background: #fff;
    position: relative;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #e8533a 0%, #c0392b 100%);
    border-radius: 16px;
    padding: 10px 16px;
    margin-bottom: 10px;
    color: white;
  }
  .header-icon { font-size: 38px; }
  .header-text h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }
  .header-text p {
    font-size: 11px;
    opacity: 0.9;
    font-weight: 600;
  }

  /* FOOTER */
  .footer {
    border-top: 2px dashed #f4a09a;
    padding-top: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9px;
    color: #aaa;
    font-weight: 700;
  }
  .footer .school { color: #c0392b; font-size: 10px; }

  @media print {
    body { margin: 0; }
    .page { margin: 0; padding: 10mm 12mm; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-icon">🎒</div>
    <div class="header-text">
      <h1>DEPREM ÇANTASI – ÇALIŞMA SAYFASI</h1>
      <p>Deprem öncesi hazırlık • 2. Sınıf Hayat Bilgisi</p>
    </div>
  </div>

  <div class="footer">
    <div class="school">🏫 Tatlıca İlkokulu • Şanlıurfa</div>
    <div>Öğretmen: Hasan Tutuş</div>
  </div>
</div>
</body>
</html>
