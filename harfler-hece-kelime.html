<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harfler, Hece ve Kelime Oluşturma</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #7C3AED;
  --secondary: #EC4899;
  --accent: #F59E0B;
  --green: #10B981;
  --red: #EF4444;
  --blue: #3B82F6;
  --bg: #FAF5FF;
  --white: #ffffff;
  --text: #1E1B4B;
  --muted: #6B7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
header {
  background: linear-gradient(135deg, #7C3AED 0%, #EC4899 100%);
  padding: 28px 20px 44px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='white' fill-opacity='0.06'%3E%3Ccircle cx='20' cy='20' r='15'/%3E%3C/g%3E%3C/svg%3E");
}
header h1 { font-family: 'Baloo 2', cursive; font-size: clamp(1.6rem,5vw,2.4rem); font-weight: 800; color: white; text-shadow: 0 3px 10px rgba(0,0,0,0.2); position: relative; }
header p { color: rgba(255,255,255,0.88); font-weight: 600; margin-top: 6px; font-size: 1rem; position: relative; }
.header-emoji { font-size: 2rem; margin-bottom: 8px; position: relative; }

/* TABS */
.tabs { display: flex; justify-content: center; gap: 8px; padding: 18px 16px 0; flex-wrap: wrap; }
.tab-btn { font-family: 'Baloo 2', cursive; font-size: .95rem; font-weight: 700; padding: 10px 20px; border-radius: 50px; border: 3px solid transparent; cursor: pointer; transition: all .2s; background: white; color: var(--muted); box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
.tab-btn.active, .tab-btn:hover { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,58,237,0.35); }

/* SECTIONS */
.section { display: none; padding: 24px 16px 60px; max-width: 820px; margin: 0 auto; }
.section.active { display: block; }

.section-title { font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.section-desc { color: var(--muted); font-size: .95rem; font-weight: 600; margin-bottom: 22px; }

/* ── BÖLÜM 1: HARF TANIMA ── */
.alfabe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-bottom: 24px; }
.harf-kart {
  background: white;
  border-radius: 16px;
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.07);
  border: 3px solid transparent;
  user-select: none;
}
.harf-kart:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 20px rgba(124,58,237,0.2); border-color: var(--primary); }
.harf-kart.selected { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.1); }
.harf-kart .buyuk { font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 800; display: block; }
.harf-kart .kucuk { font-size: .8rem; font-weight: 600; opacity: .7; }

.harf-bilgi {
  background: white;
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  border-left: 6px solid var(--primary);
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;
}
.harf-bilgi .big-harf { font-family: 'Baloo 2', cursive; font-size: 4rem; font-weight: 800; color: var(--primary); line-height: 1; }
.harf-bilgi .ornekler { font-size: 1rem; font-weight: 700; color: var(--text); }
.harf-bilgi .ornek-badge { display: inline-block; background: #EDE9FE; color: var(--primary); padding: 4px 12px; border-radius: 50px; margin: 3px; font-weight: 700; font-size: .9rem; }

/* ── BÖLÜM 2: HECE OLUŞTURMA ── */
.hece-oyun { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 16px; }
.hece-soru { font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }
.hece-soru span { background: var(--accent); padding: 2px 10px; border-radius: 8px; font-size: 1.3rem; }
.harf-secenekler { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.hece-harf {
  font-family: 'Baloo 2', cursive;
  font-size: 1.4rem;
  font-weight: 800;
  padding: 12px 18px;
  border-radius: 14px;
  border: 3px solid #e2e8f0;
  background: #f8fafc;
  cursor: pointer;
  transition: all .2s;
  user-select: none;
  min-width: 52px;
  text-align: center;
}
.hece-harf:hover { border-color: var(--primary); background: #EDE9FE; color: var(--primary); transform: scale(1.05); }
.hece-harf.used { opacity: .35; pointer-events: none; }
.hece-harf.correct { background: #D1FAE5; border-color: var(--green); color: #065F46; }
.hece-harf.wrong { background: #FEE2E2; border-color: var(--red); color: #991B1B; animation: shake .3s; }

.hece-cevap-alan {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  min-height: 56px;
  border: 3px dashed #e2e8f0;
  border-radius: 16px;
  padding: 10px;
  background: #f8fafc;
  align-items: center;
  margin-bottom: 12px;
}
.hece-cevap-harf {
  font-family: 'Baloo 2', cursive;
  font-size: 1.4rem;
  font-weight: 800;
  padding: 8px 14px;
  border-radius: 10px;
  background: var(--primary);
  color: white;
  cursor: pointer;
  transition: all .2s;
}
.hece-cevap-harf:hover { background: var(--secondary); transform: scale(1.05); }

.hece-progress { display: flex; gap: 8px; margin-bottom: 16px; }
.hece-dot { width: 12px; height: 12px; border-radius: 50%; background: #e2e8f0; transition: background .3s; }
.hece-dot.done { background: var(--green); }
.hece-dot.active { background: var(--primary); }

/* ── BÖLÜM 3: KELİME OLUŞTURMA ── */
.kelime-oyun { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 16px; }
.kelime-ipucu { font-family: 'Baloo 2', cursive; font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.kelime-emoji { font-size: 3rem; text-align: center; margin-bottom: 12px; display: block; }
.hece-kutular { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
.hece-kutu {
  font-family: 'Baloo 2', cursive;
  font-size: 1.2rem;
  font-weight: 800;
  padding: 12px 18px;
  border-radius: 14px;
  border: 3px solid #e2e8f0;
  background: #f8fafc;
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}
.hece-kutu:hover { border-color: var(--secondary); background: #FDF2F8; color: var(--secondary); transform: scale(1.05); }
.hece-kutu.secili { background: var(--secondary); color: white; border-color: var(--secondary); }
.hece-kutu.correct { background: #D1FAE5; border-color: var(--green); color: #065F46; }
.hece-kutu.wrong { background: #FEE2E2; border-color: var(--red); color: #991B1B; animation: shake .3s; }
.hece-kutu.used { opacity: .35; pointer-events: none; }

.kelime-alani {
  min-height: 56px;
  border: 3px dashed #e2e8f0;
  border-radius: 16px;
  padding: 10px 14px;
  background: #f8fafc;
  font-family: 'Baloo 2', cursive;
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--primary);
  text-align: center;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  cursor: pointer;
}
.kelime-alani span { background: var(--primary); color: white; padding: 4px 12px; border-radius: 8px; }
.kelime-alani:hover { border-color: var(--primary); }

/* PUAN TAHTASI */
.skor { text-align: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 20px; padding: 20px; color: white; margin-top: 16px; }
.skor .num { font-family: 'Baloo 2', cursive; font-size: 2.8rem; font-weight: 800; line-height: 1; }
.skor p { font-size: .95rem; font-weight: 600; opacity: .9; margin-top: 4px; }

/* BUTONLAR */
.btn { padding: 12px 26px; border-radius: 50px; border: none; font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .2s; margin: 5px 4px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
.btn:hover { transform: translateY(-2px); }
.btn-check { background: var(--green); color: white; }
.btn-clear { background: var(--accent); color: #1e1b4b; }
.btn-next { background: var(--primary); color: white; }
.btn-retry { background: var(--secondary); color: white; }

/* CONFETTI */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
.confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: fall linear forwards; }
@keyframes fall { 0% { opacity:1; transform: translateY(-20px) rotate(0deg); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg); } }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* BUTONLAR */
.btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:24px; }
.btn-yaz { padding:12px 24px; border-radius:50px; border:none; font-family:'Baloo 2',cursive; font-size:1rem; font-weight:700; cursor:pointer; background:#7C3AED; color:white; box-shadow:0 4px 14px rgba(0,0,0,0.1); transition:all .2s; }
.btn-indir { padding:12px 24px; border-radius:50px; border:none; font-family:'Baloo 2',cursive; font-size:1rem; font-weight:700; cursor:pointer; background:#F97316; color:white; box-shadow:0 4px 14px rgba(0,0,0,0.1); transition:all .2s; }
.btn-yaz:hover, .btn-indir:hover { transform:translateY(-2px); }

/* PRINT */
@media print {
  .tabs, .tab-btn { display: none !important; }
  .section { display: block !important; }
  header { background: var(--primary) !important; -webkit-print-color-adjust: exact; }
}
</style>
</head>
<body>
<div id="confetti-wrap" class="confetti-wrap"></div>

<header>
  <div class="header-emoji">🔤</div>
  <h1>Harfler, Hece ve Kelime</h1>
  <p>2. Sınıf · Türkçe Dersi</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('harf', this)">🔤 Harf Tanıma</button>
  <button class="tab-btn" onclick="switchTab('hece', this)">🔡 Hece Oluşturma</button>
  <button class="tab-btn" onclick="switchTab('kelime', this)">📝 Kelime Oluşturma</button>
</div>

<!-- ══ BÖLÜM 1: HARF TANIMA ══ -->
<div id="harf" class="section active">
  <p class="section-title">🔤 Harf Tanıma</p>
  <p class="section-desc">Bir harfe tıkla, büyük-küçük yazılışını ve örneklerini gör!</p>

  <div class="alfabe-grid" id="alfabe-grid"></div>

  <div class="harf-bilgi" id="harf-bilgi">
    <p style="color:var(--muted);font-weight:700;">👆 Yukarıdan bir harfe tıkla!</p>
  </div>
  <div class="btn-row">
    <button class="btn-yaz" onclick="window.print()">🖨️ Yazdır</button>
    <button class="btn-indir" onclick="indir()">⬇️ İndir</button>
  </div>
</div>

<!-- ══ BÖLÜM 2: HECE OLUŞTURMA ══ -->
<div id="hece" class="section">
  <p class="section-title">🔡 Hece Oluşturma</p>
  <p class="section-desc">Verilen harfleri doğru sıraya koyarak heceyi oluştur!</p>

  <div class="hece-progress" id="hece-progress"></div>

  <div class="hece-oyun" id="hece-oyun"></div>

  <div style="text-align:center;">
    <button class="btn btn-clear" onclick="hece_temizle()">🔄 Temizle</button>
    <button class="btn btn-check" onclick="hece_kontrol()">✅ Kontrol Et</button>
  </div>

  <div id="hece-skor" style="display:none" class="skor">
    <div class="num" id="hece-skor-num"></div>
    <p id="hece-skor-msg"></p>
    <button class="btn btn-retry" onclick="heceBaslat()">🔄 Tekrar</button>
  </div>

  <div class="btn-row">
    <button class="btn-yaz" onclick="window.print()">🖨️ Yazdır</button>
    <button class="btn-indir" onclick="indir()">⬇️ İndir</button>
  </div>
</div>

<!-- ══ BÖLÜM 3: KELİME OLUŞTURMA ══ -->
<div id="kelime" class="section">
  <p class="section-title">📝 Kelime Oluşturma</p>
  <p class="section-desc">Heceleri birleştirerek kelimeyi oluştur!</p>

  <div class="hece-progress" id="kelime-progress"></div>

  <div class="kelime-oyun" id="kelime-oyun"></div>

  <div style="text-align:center;">
    <button class="btn btn-clear" onclick="kelime_temizle()">🔄 Temizle</button>
    <button class="btn btn-check" onclick="kelime_kontrol()">✅ Kontrol Et</button>
  </div>

  <div id="kelime-skor" style="display:none" class="skor">
    <div class="num" id="kelime-skor-num"></div>
    <p id="kelime-skor-msg"></p>
    <button class="btn btn-retry" onclick="kelimeBaslat()">🔄 Tekrar</button>
  </div>

  <div class="btn-row">
    <button class="btn-yaz" onclick="window.print()">🖨️ Yazdır</button>
    <button class="btn-indir" onclick="indir()">⬇️ İndir</button>
  </div>
</div>

<script>
// ── TAB ──
function switchTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ── HARF VERİLERİ ──
const harfler = [
  { h: 'A', ornek: ['arı', 'at', 'anne'] },
  { h: 'B', ornek: ['bal', 'baba', 'balon'] },
  { h: 'C', ornek: ['cam', 'cep', 'ceviz'] },
  { h: 'Ç', ornek: ['çiçek', 'çanta', 'çay'] },
  { h: 'D', ornek: ['dal', 'dil', 'deve'] },
  { h: 'E', ornek: ['el', 'ev', 'ekmek'] },
  { h: 'F', ornek: ['fare', 'fener', 'fıstık'] },
  { h: 'G', ornek: ['gül', 'göz', 'gemi'] },
  { h: 'Ğ', ornek: ['dağ', 'bağ', 'yağmur'] },
  { h: 'H', ornek: ['hava', 'hal', 'horoz'] },
  { h: 'I', ornek: ['ışık', 'ırmak', 'ısı'] },
  { h: 'İ', ornek: ['ip', 'inek', 'iğne'] },
  { h: 'J', ornek: ['jilet', 'jeton', 'jöle'] },
  { h: 'K', ornek: ['kedi', 'kuş', 'kale'] },
  { h: 'L', ornek: ['lale', 'limon', 'lokum'] },
  { h: 'M', ornek: ['masa', 'mavi', 'meyve'] },
  { h: 'N', ornek: ['nar', 'nehir', 'nine'] },
  { h: 'O', ornek: ['ot', 'okul', 'oyun'] },
  { h: 'Ö', ornek: ['ördek', 'ödev', 'öğretmen'] },
  { h: 'P', ornek: ['pul', 'palto', 'portakal'] },
  { h: 'R', ornek: ['rüzgar', 'renk', 'resim'] },
  { h: 'S', ornek: ['su', 'sepet', 'saç'] },
  { h: 'Ş', ornek: ['şeker', 'şapka', 'şehir'] },
  { h: 'T', ornek: ['top', 'taş', 'tavuk'] },
  { h: 'U', ornek: ['uçak', 'uzay', 'uyku'] },
  { h: 'Ü', ornek: ['üzüm', 'ütü', 'ülke'] },
  { h: 'V', ornek: ['vapur', 'vişne', 'vücut'] },
  { h: 'Y', ornek: ['yılan', 'yol', 'yumurta'] },
  { h: 'Z', ornek: ['zeytin', 'zil', 'zebra'] },
];

// Alfabe grid
const grid = document.getElementById('alfabe-grid');
harfler.forEach(harf => {
  const div = document.createElement('div');
  div.className = 'harf-kart';
  div.innerHTML = `<span class="buyuk">${harf.h}</span><span class="kucuk">${harf.h.toLowerCase()}</span>`;
  div.onclick = () => harfSec(harf, div);
  grid.appendChild(div);
});

function harfSec(harf, el) {
  document.querySelectorAll('.harf-kart').forEach(k => k.classList.remove('selected'));
  el.classList.add('selected');
  const bilgi = document.getElementById('harf-bilgi');
  bilgi.innerHTML = `
    <div class="big-harf">${harf.h} ${harf.h.toLowerCase()}</div>
    <div class="ornekler">
      ${harf.ornek.map(o => `<span class="ornek-badge">🔹 ${o}</span>`).join('')}
    </div>
  `;
}

// ── HECE OYUNU ──
const heceler = [
  { hece: 'MA', harfler: ['M','A','L','T'] },
  { hece: 'BA', harfler: ['B','A','R','K'] },
  { hece: 'EV', harfler: ['E','V','Z','P'] },
  { hece: 'GÜL', harfler: ['G','Ü','L','K'] },
  { hece: 'KAR', harfler: ['K','A','R','S'] },
  { hece: 'SU', harfler: ['S','U','T','N'] },
  { hece: 'AT', harfler: ['A','T','Y','P'] },
  { hece: 'DAL', harfler: ['D','A','L','M'] },
];

let heceSoru = 0, heceSkor = 0, heceSec = [];

function heceBaslat() {
  heceSoru = 0; heceSkor = 0; heceSec = [];
  document.getElementById('hece-skor').style.display = 'none';
  heceRender();
}

function heceRender() {
  const progress = document.getElementById('hece-progress');
  progress.innerHTML = heceler.map((_, i) => `<div class="hece-dot ${i < heceSoru ? 'done' : i === heceSoru ? 'active' : ''}"></div>`).join('');

  if (heceSoru >= heceler.length) {
    document.getElementById('hece-oyun').innerHTML = '';
    const pct = Math.round(heceSkor / heceler.length * 100);
    document.getElementById('hece-skor-num').textContent = heceSkor + ' / ' + heceler.length;
    document.getElementById('hece-skor-msg').textContent = pct >= 80 ? '🌟 Harika! Heceleri çok iyi biliyorsun!' : pct >= 50 ? '👍 İyi iş! Biraz daha pratik yapabilirsin.' : '💪 Tekrar dene, başarabilirsin!';
    document.getElementById('hece-skor').style.display = 'block';
    if (pct >= 80) konfeti();
    return;
  }

  const q = heceler[heceSoru];
  heceSec = [];
  const karisik = [...q.harfler].sort(() => Math.random() - 0.5);

  document.getElementById('hece-oyun').innerHTML = `
    <div class="hece-soru">Bu harflerle bir hece oluştur: <span>${q.hece.length} harf</span></div>
    <div class="hece-cevap-alan" id="hece-cevap" onclick="heceSil()"></div>
    <div class="harf-secenekler" id="harf-secenekler">
      ${karisik.map((h, i) => `<div class="hece-harf" id="hh-${i}" onclick="heceEkle('${h}', ${i})">${h}</div>`).join('')}
    </div>
  `;
}

function heceEkle(harf, idx) {
  const el = document.getElementById('hh-' + idx);
  if (el.classList.contains('used')) return;
  el.classList.add('used');
  heceSec.push({ harf, idx });
  renderCevap();
}

function renderCevap() {
  const alan = document.getElementById('hece-cevap');
  alan.innerHTML = heceSec.map(s => `<div class="hece-cevap-harf">${s.harf}</div>`).join('');
}

function heceSil() {
  if (heceSec.length === 0) return;
  const son = heceSec.pop();
  document.getElementById('hh-' + son.idx).classList.remove('used');
  renderCevap();
}

function hece_temizle() {
  heceSec.forEach(s => document.getElementById('hh-' + s.idx)?.classList.remove('used'));
  heceSec = [];
  renderCevap();
}

function hece_kontrol() {
  const q = heceler[heceSoru];
  const cevap = heceSec.map(s => s.harf).join('');
  if (cevap === q.hece) {
    heceSkor++;
    heceSoru++;
    setTimeout(heceRender, 500);
  } else {
    document.getElementById('hece-cevap').style.border = '3px solid var(--red)';
    setTimeout(() => {
      document.getElementById('hece-cevap').style.border = '';
      hece_temizle();
    }, 700);
  }
}

heceBaslat();

// ── KELİME OYUNU ──
const kelimeler = [
  { kelime: 'anne', heceler: ['an', 'ne'], sahte: ['ma', 'li', 'bu'], emoji: '👩' },
  { kelime: 'okul', heceler: ['o', 'kul'], sahte: ['ma', 'da'], emoji: '🏫' },
  { kelime: 'elma', heceler: ['el', 'ma'], sahte: ['ra', 'bu'], emoji: '🍎' },
  { kelime: 'kitap', heceler: ['ki', 'tap'], sahte: ['ma', 'li'], emoji: '📚' },
  { kelime: 'araba', heceler: ['a', 'ra', 'ba'], sahte: ['mi', 'lu'], emoji: '🚗' },
  { kelime: 'kelebek', heceler: ['ke', 'le', 'bek'], sahte: ['ma', 'bu'], emoji: '🦋' },
  { kelime: 'çiçek', heceler: ['çi', 'çek'], sahte: ['ma', 'li'], emoji: '🌸' },
  { kelime: 'sepet', heceler: ['se', 'pet'], sahte: ['ma', 'bu'], emoji: '🧺' },
];

let kelimeSoru = 0, kelimeSkor = 0, kelimeSec = [];

function kelimeBaslat() {
  kelimeSoru = 0; kelimeSkor = 0; kelimeSec = [];
  document.getElementById('kelime-skor').style.display = 'none';
  kelimeRender();
}

function kelimeRender() {
  const progress = document.getElementById('kelime-progress');
  progress.innerHTML = kelimeler.map((_, i) => `<div class="hece-dot ${i < kelimeSoru ? 'done' : i === kelimeSoru ? 'active' : ''}"></div>`).join('');

  if (kelimeSoru >= kelimeler.length) {
    document.getElementById('kelime-oyun').innerHTML = '';
    const pct = Math.round(kelimeSkor / kelimeler.length * 100);
    document.getElementById('kelime-skor-num').textContent = kelimeSkor + ' / ' + kelimeler.length;
    document.getElementById('kelime-skor-msg').textContent = pct >= 80 ? '🌟 Mükemmel! Kelimeleri çok iyi oluşturdun!' : pct >= 50 ? '👍 Güzel! Biraz daha çalışırsan harika olacak.' : '💪 Tekrar dene, başarabilirsin!';
    document.getElementById('kelime-skor').style.display = 'block';
    if (pct >= 80) konfeti();
    return;
  }

  const q = kelimeler[kelimeSoru];
  kelimeSec = [];
  const tumHeceler = [...q.heceler, ...q.sahte].sort(() => Math.random() - 0.5);

  document.getElementById('kelime-oyun').innerHTML = `
    <div class="kelime-ipucu">Bu resme bakarak kelimeyi oluştur:</div>
    <span class="kelime-emoji">${q.emoji}</span>
    <div class="kelime-alani" id="kelime-alan" onclick="kelimeSonSil()">
      <span style="color:var(--muted);font-size:.9rem;font-family:'Nunito';font-weight:600;" id="placeholder">Hecelere tıkla...</span>
    </div>
    <div class="hece-kutular" id="hece-kutular">
      ${tumHeceler.map((h, i) => `<div class="hece-kutu" id="hk-${i}" onclick="kelimeEkle('${h}', ${i})">${h}</div>`).join('')}
    </div>
  `;
}

function kelimeEkle(hece, idx) {
  const el = document.getElementById('hk-' + idx);
  if (el.classList.contains('used')) return;
  el.classList.add('used');
  kelimeSec.push({ hece, idx });
  renderKelimeAlan();
}

function kelimeSonSil() {
  if (kelimeSec.length === 0) return;
  const son = kelimeSec.pop();
  document.getElementById('hk-' + son.idx)?.classList.remove('used');
  renderKelimeAlan();
}

function renderKelimeAlan() {
  const alan = document.getElementById('kelime-alan');
  if (kelimeSec.length === 0) {
    alan.innerHTML = `<span style="color:var(--muted);font-size:.9rem;font-family:'Nunito';font-weight:600;">Hecelere tıkla...</span>`;
  } else {
    alan.innerHTML = kelimeSec.map(s => `<span>${s.hece}</span>`).join('');
  }
}

function kelime_temizle() {
  kelimeSec.forEach(s => document.getElementById('hk-' + s.idx)?.classList.remove('used'));
  kelimeSec = [];
  renderKelimeAlan();
}

function kelime_kontrol() {
  const q = kelimeler[kelimeSoru];
  const cevap = kelimeSec.map(s => s.hece).join('');
  if (cevap === q.kelime) {
    kelimeSkor++;
    kelimeSoru++;
    setTimeout(kelimeRender, 600);
  } else {
    document.getElementById('kelime-alan').style.border = '3px solid var(--red)';
    setTimeout(() => {
      document.getElementById('kelime-alan').style.border = '3px dashed #e2e8f0';
      kelime_temizle();
    }, 700);
  }
}

kelimeBaslat();

// ── İNDİR ──
function indir() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'harfler-hece-kelime.html';
  a.click();
}

// ── KONFETİ ──
function konfeti() {
  const colors = ['#7C3AED','#EC4899','#F59E0B','#10B981','#3B82F6','#EF4444'];
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (8 + Math.random() * 8) + 'px';
    p.style.height = (8 + Math.random() * 8) + 'px';
    p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    p.style.animationDelay = Math.random() * 0.8 + 's';
    wrap.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}
</script>
