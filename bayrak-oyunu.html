<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bayrak Oyunu 🏳️</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:linear-gradient(135deg,#0a0a2e,#1a1a4e); min-height:100vh; font-family:'Nunito',sans-serif; color:#fff; }
.header { text-align:center; padding:24px 20px 14px; }
.header h1 { font-family:'Fredoka One',cursive; font-size:2.2rem; color:#ffd700; }
.header p { color:rgba(255,255,255,.6); font-weight:700; font-size:14px; }

.score-row { display:flex; justify-content:center; gap:20px; margin-bottom:18px; padding:0 16px; }
.sc { text-align:center; background:rgba(255,255,255,.08); border-radius:14px; padding:10px 18px; }
.sc-num { font-family:'Fredoka One',cursive; font-size:26px; color:#ffd700; }
.sc-lbl { font-size:11px; font-weight:800; color:rgba(255,255,255,.5); text-transform:uppercase; }

.game { max-width:640px; margin:0 auto; padding:0 16px 40px; }

.mode-row { display:flex; gap:8px; justify-content:center; margin-bottom:18px; flex-wrap:wrap; }
.mode-btn { background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); color:#fff; border-radius:20px; padding:8px 18px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:800; cursor:pointer; transition:all .2s; }
.mode-btn.active { background:#ffd700; color:#1a1a3e; border-color:#ffd700; }

.flag-display {
  text-align:center; margin-bottom:22px;
  background:rgba(255,255,255,.06); border:2px solid rgba(255,255,255,.12);
  border-radius:20px; padding:24px;
}
.flag-emoji { font-size:96px; display:block; margin-bottom:10px; line-height:1.2; transition:all .3s; }
.flag-question { font-family:'Fredoka One',cursive; font-size:18px; color:rgba(255,255,255,.7); }
.flag-hint { font-size:13px; color:rgba(255,255,255,.45); margin-top:6px; font-weight:700; }

.options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.opt-btn {
  background:rgba(255,255,255,.08); border:2.5px solid rgba(255,255,255,.18);
  color:#fff; border-radius:14px; padding:14px 10px;
  font-family:'Nunito',sans-serif; font-size:15px; font-weight:800;
  cursor:pointer; transition:all .2s; text-align:center;
}
.opt-btn:hover { background:rgba(255,255,255,.18); transform:translateY(-2px); }
.opt-btn.correct { background:rgba(76,175,80,.3); border-color:#4caf50; color:#a5d6a7; }
.opt-btn.wrong { background:rgba(239,83,80,.3); border-color:#ef5350; color:#ef9a9a; }
.opt-btn:disabled { cursor:not-allowed; }

.feedback { border-radius:14px; padding:14px; text-align:center; margin-bottom:14px; display:none; }
.feedback.show { display:block; }
.feedback.ok { background:rgba(76,175,80,.2); border:2px solid #4caf50; }
.feedback.no { background:rgba(239,83,80,.2); border:2px solid #ef5350; }
.feedback-title { font-family:'Fredoka One',cursive; font-size:20px; margin-bottom:4px; }
.feedback-info { font-size:13px; font-weight:700; color:rgba(255,255,255,.7); }

.next-btn {
  display:block; width:100%; background:#ffd700; color:#1a1a3e; border:none;
  border-radius:20px; padding:13px; font-family:'Fredoka One',cursive; font-size:19px;
  cursor:pointer; display:none;
}
.next-btn.show { display:block; }
.next-btn:hover { background:#ffecb3; }

.progress { background:rgba(255,255,255,.1); border-radius:10px; height:8px; margin-bottom:16px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(135deg,#ffd700,#ff9800); border-radius:10px; transition:width .4s; }
</style>
</head>
<body>

<div class="header">
  <h1>🏳️ Bayrak Oyunu</h1>
  <p>Bayrağı gör, ülkeyi bul!</p>
</div>

<div class="game">
  <div class="mode-row">
    <button class="mode-btn active" onclick="setMode('bayrak',this)">🏳️ Bayrağı Bul</button>
    <button class="mode-btn" onclick="setMode('ulke',this)">🗺️ Ülkeyi Bul</button>
    <button class="mode-btn" onclick="setMode('karısık',this)">🎲 Karışık</button>
  </div>

  <div class="score-row">
    <div class="sc"><div class="sc-num" id="correct">0</div><div class="sc-lbl">Doğru</div></div>
    <div class="sc"><div class="sc-num" id="wrong">0</div><div class="sc-lbl">Yanlış</div></div>
    <div class="sc"><div class="sc-num" id="streak">0</div><div class="sc-lbl">Seri 🔥</div></div>
    <div class="sc"><div class="sc-num" id="qnum">1</div><div class="sc-lbl">Soru</div></div>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div class="flag-display">
    <span class="flag-emoji" id="flagEmoji">🇹🇷</span>
    <div class="flag-question" id="flagQuestion">Bu hangi ülkenin bayrağı?</div>
    <div class="flag-hint" id="flagHint"></div>
  </div>

  <div class="options" id="options"></div>

  <div class="feedback" id="feedback">
    <div class="feedback-title" id="feedbackTitle"></div>
    <div class="feedback-info" id="feedbackInfo"></div>
  </div>

  <button class="next-btn" id="nextBtn" onclick="nextQ()">➡️ Sonraki</button>
</div>

<script>
var countries = [
  {name:'Türkiye', flag:'🇹🇷', capital:'Ankara', continent:'Asya/Avrupa'},
  {name:'Almanya', flag:'🇩🇪', capital:'Berlin', continent:'Avrupa'},
  {name:'Fransa', flag:'🇫🇷', capital:'Paris', continent:'Avrupa'},
  {name:'İtalya', flag:'🇮🇹', capital:'Roma', continent:'Avrupa'},
  {name:'İspanya', flag:'🇪🇸', capital:'Madrid', continent:'Avrupa'},
  {name:'İngiltere', flag:'🇬🇧', capital:'Londra', continent:'Avrupa'},
  {name:'ABD', flag:'🇺🇸', capital:'Washington', continent:'Amerika'},
  {name:'Japonya', flag:'🇯🇵', capital:'Tokyo', continent:'Asya'},
  {name:'Çin', flag:'🇨🇳', capital:'Pekin', continent:'Asya'},
  {name:'Rusya', flag:'🇷🇺', capital:'Moskova', continent:'Asya/Avrupa'},
  {name:'Brezilya', flag:'🇧🇷', capital:'Brasilia', continent:'Amerika'},
  {name:'Kanada', flag:'🇨🇦', capital:'Ottawa', continent:'Amerika'},
  {name:'Avustralya', flag:'🇦🇺', capital:'Kanberra', continent:'Okyanusya'},
  {name:'Mısır', flag:'🇪🇬', capital:'Kahire', continent:'Afrika'},
  {name:'Hindistan', flag:'🇮🇳', capital:'Yeni Delhi', continent:'Asya'},
  {name:'Meksika', flag:'🇲🇽', capital:'Meksiko', continent:'Amerika'},
  {name:'Arjantin', flag:'🇦🇷', capital:'Buenos Aires', continent:'Amerika'},
  {name:'Yunanistan', flag:'🇬🇷', capital:'Atina', continent:'Avrupa'},
  {name:'Portekiz', flag:'🇵🇹', capital:'Lizbon', continent:'Avrupa'},
  {name:'Hollanda', flag:'🇳🇱', capital:'Amsterdam', continent:'Avrupa'},
  {name:'İsviçre', flag:'🇨🇭', capital:'Bern', continent:'Avrupa'},
  {name:'Norveç', flag:'🇳🇴', capital:'Oslo', continent:'Avrupa'},
  {name:'İsveç', flag:'🇸🇪', capital:'Stockholm', continent:'Avrupa'},
  {name:'Polonya', flag:'🇵🇱', capital:'Varşova', continent:'Avrupa'},
  {name:'Kore', flag:'🇰🇷', capital:'Seul', continent:'Asya'},
  {name:'Suudi Arabistan', flag:'🇸🇦', capital:'Riyad', continent:'Asya'},
  {name:'Güney Afrika', flag:'🇿🇦', capital:'Pretoria', continent:'Afrika'},
  {name:'Nijerya', flag:'🇳🇬', capital:'Abuja', continent:'Afrika'},
];

var mode = 'bayrak';
var correctCount=0, wrongCount=0, streakCount=0, qNum=0;
var currentAnswer='', answered=false;
var usedIdx=[];

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  usedIdx=[]; correctCount=0; wrongCount=0; streakCount=0; qNum=0;
  document.getElementById('correct').textContent=0;
  document.getElementById('wrong').textContent=0;
  document.getElementById('streak').textContent=0;
  nextQ();
}

function nextQ() {
  answered=false;
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');

  // Mevcut modu belirle
  var actualMode = mode;
  if(mode==='karısık') actualMode = Math.random()>.5?'bayrak':'ulke';

  // Ülke seç
  var available = countries.filter(function(_,i){return !usedIdx.includes(i);});
  if(available.length<4){usedIdx=[];available=countries;}
  var correctIdx = Math.floor(Math.random()*available.length);
  var correct = available[correctIdx];
  usedIdx.push(countries.indexOf(correct));

  qNum++;
  document.getElementById('qnum').textContent=qNum;
  document.getElementById('progressBar').style.width = Math.min(qNum/28*100,100)+'%';

  if(actualMode==='bayrak') {
    // Bayrağı göster, ülkeyi bul
    document.getElementById('flagEmoji').textContent = correct.flag;
    document.getElementById('flagQuestion').textContent = 'Bu hangi ülkenin bayrağı?';
    document.getElementById('flagHint').textContent = '🌍 '+correct.continent;
    currentAnswer = correct.name;

    // 4 seçenek
    var opts = [correct];
    var others = countries.filter(function(c){return c.name!==correct.name;});
    shuffle(others);
    opts = opts.concat(others.slice(0,3));
    shuffle(opts);

    buildOptions(opts.map(function(c){return c.name;}), correct.name, correct);
  } else {
    // Ülkeyi göster, bayrağı bul
    document.getElementById('flagEmoji').textContent = '🌍';
    document.getElementById('flagQuestion').textContent = correct.name + ' ülkesinin bayrağı hangisi?';
    document.getElementById('flagHint').textContent = '🏛️ Başkent: '+correct.capital;
    currentAnswer = correct.flag;

    var opts = [correct];
    var others = countries.filter(function(c){return c.name!==correct.name;});
    shuffle(others);
    opts = opts.concat(others.slice(0,3));
    shuffle(opts);

    buildOptions(opts.map(function(c){return c.flag;}), correct.flag, correct);
  }
}

function buildOptions(opts, answer, countryData) {
  var container = document.getElementById('options');
  container.innerHTML='';
  opts.forEach(function(opt) {
    var btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.style.fontSize = opt.length<=4?'32px':'15px';
    btn.onclick=function(){
      if(answered) return;
      answered=true;
      if(opt===answer) {
        btn.classList.add('correct');
        correctCount++; streakCount++;
        document.getElementById('correct').textContent=correctCount;
        document.getElementById('streak').textContent=streakCount;
        showFeedback(true,'🎉 Doğru!','🏛️ '+countryData.name+' · Başkent: '+countryData.capital+' · '+countryData.continent);
      } else {
        btn.classList.add('wrong');
        wrongCount++; streakCount=0;
        document.getElementById('wrong').textContent=wrongCount;
        document.getElementById('streak').textContent=streakCount;
        // Doğruyu vurgula
        Array.from(container.children).forEach(function(b){
          if(b.textContent===answer) b.classList.add('correct');
        });
        showFeedback(false,'❌ Yanlış!','Doğrusu: '+countryData.flag+' '+countryData.name+' · Başkent: '+countryData.capital);
      }
      Array.from(container.children).forEach(function(b){b.disabled=true;});
      document.getElementById('nextBtn').classList.add('show');
    };
    container.appendChild(btn);
  });
}

function showFeedback(ok, title, info) {
  var fb=document.getElementById('feedback');
  fb.className='feedback show '+(ok?'ok':'no');
  document.getElementById('feedbackTitle').textContent=title;
  document.getElementById('feedbackInfo').textContent=info;
}

function shuffle(arr) {
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i]; arr[i]=arr[j]; arr[j]=t;
  }
  return arr;
}

nextQ();
</script>
</body>
</html>
